<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar" id="sidebar">
    <span onclick="toggleSidebar()" class="close-sidebar"><i class="ph ph-x"></i></span>
    <h2>NoteVerse</h2>
    <a href="#" onclick="toggleSidebar(); location.reload();"><i class="ph ph-house"></i> Home</a>
    <a href="#" onclick="toggleSubMenu('notesMenu', event)"><i class="ph ph-book-open-text"></i> Notes</a>
    <div class="submenu" id="notesMenu">
        <a href="#">Semester 1</a><a href="#">Semester 2</a>
    </div>
    <a href="#" onclick="toggleSubMenu('pyqMenu', event)"><i class="ph ph-file-text"></i> PYQs</a>
    <div class="submenu" id="pyqMenu">
        <a href="#">Semester 1</a><a href="#">Semester 2</a>
    </div>
    <a href="#" onclick="toggleSubMenu('resourcesMenu', event)"><i class="ph ph-cube"></i> Resources</a>
    <div class="submenu" id="resourcesMenu">
        <a href="#">Semester 1</a><a href="#">Semester 2</a>
    </div>
    <a href="#" onclick="openAbout()"><i class="ph ph-info"></i> About</a>
</div>

<div class="topbar">
    <h3>NoteVerse</h3>
    <span class="menu-btn" onclick="toggleSidebar()"><i class="ph ph-list"></i></span>
</div>

<div class="main">
    <section class="hero">
        <h1>All Your Notes & PYQs in One Place</h1>
        <p>Free academic resources for students</p>
    </section>

    <section id="pdfViewer">
        <iframe id="pdfFrame"></iframe>
    </section>

    <section class="upload-section">
        <h2>Contribute to NoteVerse</h2>
        <form id="uploadForm">
            <input type="text" id="fileName" class="upload-input" placeholder="File Name" required>
            <div class="upload-row">
                <select id="fileCategory" class="upload-input" required>
                    <option value="" disabled selected>Category</option>
                    <option value="notes">Notes</option>
                    <option value="pyq">PYQs</option>
                    <option value="resources">Resources</option>
                </select>
                <select id="fileSemester" class="upload-input" required>
                    <option value="" disabled selected>Semester</option>
                    <option value="1">Sem 1</option><option value="2">Sem 2</option>
                </select>
            </div>
            <input type="file" id="fileInput" class="upload-input" required>
            <button type="submit" class="upload-btn">Upload & Save File</button>
        </form>
    </section>
</div>

<div id="aboutPanel" class="about-panel">
    <span onclick="closeAbout()" class="close-about"><i class="ph ph-x"></i></span>
    <h2>About NoteVerse</h2>
    <p>Your content here...</p>
</div>

<script>
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
    function toggleSubMenu(id, event) {
        event.preventDefault();
        document.querySelectorAll(".submenu").forEach(m => { if(m.id !== id) m.classList.remove("active"); });
        document.getElementById(id).classList.toggle("active");
    }
    function openAbout() { document.getElementById("aboutPanel").style.right = "0"; }
    function closeAbout() { document.getElementById("aboutPanel").style.right = "-400px"; }
    function openPDF(file) {
        const viewer = document.getElementById("pdfViewer");
        viewer.style.display = "block";
        document.getElementById("pdfFrame").src = file;
        window.scrollTo({ top: viewer.offsetTop - 100, behavior: "smooth" });
    }
</script>

</body>
</html>
